sonar.projectKey=WebDevSecOps
sonar.organization=webdevsecops
sonar.host.url=https://sonarcloud.io

sonar.sources=WebDevSecOps
sonar.tests=tests
sonar.test.inclusions=tests/**/*Test*.cs,tests/**/*Tests*.cs

sonar.cs.opencover.reportsPaths=tests/**/coverage.opencover.xml
sonar.cs.nunit.reportsPaths=tests/**/TestResults.xml

sonar.coverage.exclusions=tests/**/obj/**,tests/**/bin/**
sonar.exclusions=**/obj/**,**/bin/**

sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S2228
sonar.issue.ignore.multicriteria.e1.resourceKey=**/Program.cs
sonar.issue.ignore.multicriteria.e2.ruleKey=rosharpsquid:S1451
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.cs

sonar.security.sast.roslyn.rulesetPath=tests/WebDevSecOps.SecurityTests/SAST/roslyn-analyzers.ruleset
